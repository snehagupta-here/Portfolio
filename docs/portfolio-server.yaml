      properties:
        folder:
          type: string
          example: portfolio/users/profile
        count:
          type: integer
          example: 2
        resourceType:
          type: string
          enum:
            - image
            - raw
            - video
            - auto
          example: image
        uploads:
          type: array
          items:
            $ref: '#/components/schemas/CloudinarySignedUploadItem'

    CloudinaryDirectUploadRequest:
      type: object
      required:
        - file
        - folder
        - public_id
        - timestamp
        - signature
        - api_key
      properties:
        file:
          type: string
          format: binary
          description: Binary file to upload to Cloudinary.
        folder:
          type: string
          description: Use the `folder` value returned by `POST /cloudinary/signed-uploads`.
          example: portfolio/users/profile
        public_id:
          type: string
          description: Use one of the `public_id` values returned by `POST /cloudinary/signed-uploads`.
          example: img-1744096800000-1
        timestamp:
          type: integer
          description: Use the signed timestamp returned by `POST /cloudinary/signed-uploads`.
          example: 1744096800
        signature:
          type: string
          description: Use the signature returned by `POST /cloudinary/signed-uploads`.
          example: 7f0fb14c2f61e0a5a2f1228f10a7e2f4f885d3f1
        api_key:
          type: string
          description: Use the API key returned by `POST /cloudinary/signed-uploads`.
          example: '123456789012345'

    CloudinaryUploadResponse:
      type: object
      required:
        - asset_id
        - public_id
        - version
        - signature
        - resource_type
        - bytes
        - secure_url
      properties:
        asset_id:
          type: string
          example: 6f5f5c90f5a24d8ab7d2d32d24e8b301
        public_id:
          type: string
          example: img-1744096800000-1
        version:
          type: integer
          example: 1744096801
        version_id:
          type: string
          example: 4fd7b3b6d8340123c97b87c0a3b0f123
        signature:
          type: string
          example: a2d06c5ce4c702e9cb2ad1c572efe4f3bbfe4101
        width:
          type: integer
          minimum: 0
          example: 512
        height:
          type: integer
          minimum: 0
          example: 512
        format:
          type: string
          example: png
        resource_type:
          type: string
          enum:
            - image
            - raw
            - video
            - auto
          example: image
        created_at:
          type: string
          format: date-time
          example: '2026-04-08T06:13:05Z'
        bytes:
          type: integer
          minimum: 0
          example: 85432
        type:
          type: string
          example: upload
        etag:
          type: string
          example: b31c8f3b7f92bc7710abbd1d8db21f92
        placeholder:
          type: boolean
          example: false
        url:
          type: string
          format: uri
          example: http://res.cloudinary.com/demo-cloud/image/upload/v1744096801/img-1744096800000-1.png
        secure_url:
          type: string
          format: uri
          example: https://res.cloudinary.com/demo-cloud/image/upload/v1744096801/img-1744096800000-1.png
        original_filename:
          type: string
          example: profile

    CloudinaryUploadErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - message
            - http_code
          properties:
            message:
              type: string
              example: Missing required parameter - file
            http_code:
              type: integer
              example: 400

    SuccessEnvelope:
      type: object
      required:
        - success
        - statusCode
        - message
        - timeStamp
        - path
      properties:
        success:
          type: boolean
          enum:
            - true
        statusCode:
          type: integer
          example: 200
        message:
          type: string
          example: Request successful
        timeStamp:
          type: string
          format: date-time
        path:
          type: string
          example: /api/v1/user

    ErrorResponse:
      type: object
      required:
        - success
        - statusCode
        - message
        - error
        - timeStamp
        - path
      properties:
        success:
          type: boolean
          enum:
            - false
        statusCode:
          type: integer
          example: 400
        message:
          oneOf:
