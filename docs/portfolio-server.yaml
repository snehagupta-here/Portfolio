openapi: 3.0.3
info:
  title: Portfolio Server
  version: 1.0.0
  description: Combined API reference for the user, skill, achievement, testimonial, experience, blog, project, contact-us, and Cloudinary flows.

servers:
  - url: http://localhost:4000/api/v1
    description: Local development server

tags:
  - name: Users
  - name: Skills
  - name: Achievements
  - name: Testimonials
  - name: Experiences
  - name: Blogs
  - name: Projects
  - name: Contact Us
  - name: Cloudinary

paths:
  /user:
    post:
      tags:
        - Users
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
            examples:
              default:
                value:
                  name: Ashu Goyal
                  about: Full-stack developer building portfolio products.
                  links:
                    - name: GitHub
                      icon: github
                      url: https://github.com/ashugoyal
                    - name: LinkedIn
                      icon: linkedin
                      url: https://www.linkedin.com/in/ashugoyal
                  skills:
                    - skill_id: 660f0c1f4d8c8b3c2adfd111
                      yoe: 3
                      scale: 8
                    - skill_id: 660f0c1f4d8c8b3c2adfd112
                      yoe: 2
                      scale: 7
                  profile_image:
                    publicId: portfolio/user/profile-image
                    secureUrl: https://res.cloudinary.com/demo/image/upload/v1/profile.jpg
                    width: 512
                    height: 512
                    format: jpg
                    resourceType: image
                    bytes: 85432
                    originalFilename: profile
                  resume:
                    publicId: portfolio/user/resume
                    secureUrl: https://res.cloudinary.com/demo/raw/upload/v1/resume.pdf
                    format: pdf
                    resourceType: raw
                    bytes: 240156
                    originalFilename: ashu-goyal-resume
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMutationResponse'
              examples:
                default:
                  value:
                    success: true
                    statusCode: 201
                    message: User created successfully.
                    data:
                      _id: 660f0c1f4d8c8b3c2adfd001
                      name: Ashu Goyal
                      about: Full-stack developer building portfolio products.
                      links:
                        - name: GitHub
                          icon: github
                          url: https://github.com/ashugoyal
                      skills:
                        - skill_id: 660f0c1f4d8c8b3c2adfd111
                          yoe: 3
                          scale: 8
                      profile_image:
                        publicId: portfolio/user/profile-image
                        secureUrl: https://res.cloudinary.com/demo/image/upload/v1/profile.jpg
                      resume:
                        publicId: portfolio/user/resume
                        secureUrl: https://res.cloudinary.com/demo/raw/upload/v1/resume.pdf
                      createdAt: '2026-04-08T06:10:00.000Z'
                      updatedAt: '2026-04-08T06:10:00.000Z'
                    timeStamp: '2026-04-08T06:10:00.000Z'
                    path: /api/v1/user
        '400':
          $ref: '#/components/responses/ValidationError'

    get:
      tags:
        - Users
      summary: Get all users
      responses:
        '200':
          description: Users fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
              examples:
                default:
                  value:
                    success: true
                    statusCode: 200
                    message: Request successful
                    data:
                      - _id: 660f0c1f4d8c8b3c2adfd001
                        name: Ashu Goyal
                        about: Full-stack developer building portfolio products.
                        links:
                          - name: GitHub
                            icon: github
                            url: https://github.com/ashugoyal
                        skills:
                          - skill_id:
                              _id: 660f0c1f4d8c8b3c2adfd111
                              name: NestJS
                              category: backend
                            yoe: 3
                            scale: 8
                        profile_image:
                          publicId: portfolio/user/profile-image
                          secureUrl: https://res.cloudinary.com/demo/image/upload/v1/profile.jpg
                        createdAt: '2026-04-08T06:10:00.000Z'
                        updatedAt: '2026-04-08T06:10:00.000Z'
                    timeStamp: '2026-04-08T06:10:01.000Z'
                    path: /api/v1/user

  /user/{id}:
    get:
      tags:
        - Users
      summary: Get a user by id
      parameters:
        - $ref: '#/components/parameters/MongoIdPathParam'
      responses:
        '200':
          description: User fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserFetchResponse'
        '400':
          $ref: '#/components/responses/InvalidUserIdError'
        '404':
          $ref: '#/components/responses/UserNotFoundError'

    patch:
      tags:
        - Users
      summary: Update a user
      parameters:
        - $ref: '#/components/parameters/MongoIdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
            examples:
              default:
                value:
                  about: Building scalable backend systems and product APIs.
                  links:
                    - name: Portfolio
                      icon: globe
                      url: https://portfolio.example.com
                  skills:
                    - skill_id: 660f0c1f4d8c8b3c2adfd111
                      yoe: 4
                      scale: 9
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMutationResponse'
        '400':
          $ref: '#/components/responses/InvalidUserIdError'
        '404':
          $ref: '#/components/responses/UserNotFoundError'

    delete:
      tags:
        - Users
      summary: Delete a user
      parameters:
        - $ref: '#/components/parameters/MongoIdPathParam'
      responses:
        '200':
          description: User deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
              examples:
                default:
                  value:
                    success: true
                    statusCode: 200
                    message: User deleted successfully.
                    timeStamp: '2026-04-08T06:10:03.000Z'
                    path: /api/v1/user/660f0c1f4d8c8b3c2adfd001
        '400':
          $ref: '#/components/responses/InvalidUserIdError'
        '404':
          $ref: '#/components/responses/UserNotFoundError'

  /user/search:
    get:
      tags:
        - Users
      summary: Search users by name or skill id
      parameters:
        - name: name
          in: query
          required: false
          description: Case-insensitive partial user name match.
          schema:
            type: string
            example: ashu
        - name: skill_id
          in: query
          required: false
          description: Filter users who have a specific skill.
          schema:
            type: string
            example: 660f0c1f4d8c8b3c2adfd111
      responses:
        '200':
          description: Users fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
              examples:
                byName:
                  value:
                    success: true
                    statusCode: 200
                    message: Request successful
                    data:
                      - _id: 660f0c1f4d8c8b3c2adfd001
                        name: Ashu Goyal
                        about: Full-stack developer building portfolio products.
                        skills:
                          - skill_id:
                              _id: 660f0c1f4d8c8b3c2adfd111
                              name: NestJS
                              category: backend
                            yoe: 3
                            scale: 8
                    timeStamp: '2026-04-08T06:10:04.000Z'
                    path: /api/v1/user/search?name=ashu
                bySkill:
                  value:
                    success: true
                    statusCode: 200
                    message: Request successful
                    data:
                      - _id: 660f0c1f4d8c8b3c2adfd001
                        name: Ashu Goyal
                        skills:
                          - skill_id:
                              _id: 660f0c1f4d8c8b3c2adfd111
                              name: NestJS
                              category: backend
                            yoe: 3
                            scale: 8
                    timeStamp: '2026-04-08T06:10:04.000Z'
                    path: /api/v1/user/search?skill_id=660f0c1f4d8c8b3c2adfd111
        '400':
          $ref: '#/components/responses/UserSearchBadRequestError'

  /skills:
    post:
      tags:
        - Skills
      summary: Create a skill
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkillCreateRequest'
            examples:
              default:
                value:
                  name: NestJS
                  category: backend
                  icon:
                    publicId: portfolio/skills/nestjs
                    secureUrl: https://res.cloudinary.com/demo/image/upload/v1/nestjs.png
                    width: 256
                    height: 256
                    format: png
                    resourceType: image
                    bytes: 48212
                    originalFilename: nestjs-logo
      responses:
        '201':
          description: Skill created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillMutationResponse'
              examples:
                default:
                  value:
                    success: true
                    statusCode: 201
                    message: Skill created successfully.
                    data:
                      _id: 660f0c1f4d8c8b3c2adfd111
                      name: NestJS
                      category: backend
                      icon:
                        publicId: portfolio/skills/nestjs
                        secureUrl: https://res.cloudinary.com/demo/image/upload/v1/nestjs.png
                      createdAt: '2026-04-08T06:11:00.000Z'
                      updatedAt: '2026-04-08T06:11:00.000Z'
                    timeStamp: '2026-04-08T06:11:00.000Z'
                    path: /api/v1/skills
        '400':
          $ref: '#/components/responses/ValidationError'

    get:
      tags:
        - Skills
      summary: Get all skills
      responses:
        '200':
          description: Skills fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillListResponse'
              examples:
                default:
                  value:
                    success: true
                    statusCode: 200
                    message: Request successful
                    data:
                      - _id: 660f0c1f4d8c8b3c2adfd111
                        name: NestJS
                        category: backend
                        icon:
                          publicId: portfolio/skills/nestjs
                          secureUrl: https://res.cloudinary.com/demo/image/upload/v1/nestjs.png
                        createdAt: '2026-04-08T06:11:00.000Z'
                        updatedAt: '2026-04-08T06:11:00.000Z'
                    timeStamp: '2026-04-08T06:11:01.000Z'
                    path: /api/v1/skills

  /skills/{id}:
    get:
      tags:
        - Skills
      summary: Get a skill by id
      parameters:
        - $ref: '#/components/parameters/MongoIdPathParam'
      responses:
        '200':
          description: Skill fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillFetchResponse'
        '400':
          $ref: '#/components/responses/InvalidSkillIdError'
        '404':
          $ref: '#/components/responses/SkillNotFoundError'

  /skills/search:
    get:
      tags:
        - Skills
      summary: Search skills by name or category
      parameters:
        - name: name
          in: query
          required: false
          description: Case-insensitive partial skill name match.
          schema:
            type: string
            example: nest
        - name: category
          in: query
          required: false
          description: Skill category filter.
          schema:
            type: string
            enum:
              - frontend
              - language
              - backend
              - database
              - cloud
              - devops
              - design
              - other
            example: backend
      responses:
        '200':
          description: Skills fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillListResponse'
              examples:
                byName:
                  value:
                    success: true
                    statusCode: 200
                    message: Request successful
                    data:
                      - _id: 660f0c1f4d8c8b3c2adfd111
                        name: NestJS
                        category: backend
                        icon:
                          publicId: portfolio/skills/nestjs
                          secureUrl: https://res.cloudinary.com/demo/image/upload/v1/nestjs.png
                        createdAt: '2026-04-08T06:11:00.000Z'
                        updatedAt: '2026-04-08T06:11:00.000Z'
                    timeStamp: '2026-04-08T06:11:02.000Z'
                    path: /api/v1/skills/search?name=nest
                byCategory:
                  value:
                    success: true
                    statusCode: 200
                    message: Request successful
                    data:
                      - _id: 660f0c1f4d8c8b3c2adfd111
                        name: NestJS
                        category: backend
                        icon:
                          publicId: portfolio/skills/nestjs
                          secureUrl: https://res.cloudinary.com/demo/image/upload/v1/nestjs.png
                        createdAt: '2026-04-08T06:11:00.000Z'
                        updatedAt: '2026-04-08T06:11:00.000Z'
                    timeStamp: '2026-04-08T06:11:02.000Z'
                    path: /api/v1/skills/search?category=backend
        '400':
          $ref: '#/components/responses/SkillSearchQueryRequiredError'

    patch:
      tags:
        - Skills
      summary: Update a skill
      parameters:
        - $ref: '#/components/parameters/MongoIdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkillUpdateRequest'
            examples:
              default:
                value:
                  name: NestJS Framework
                  category: backend
      responses:
        '200':
          description: Skill updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillMutationResponse'
        '400':
          $ref: '#/components/responses/InvalidSkillIdError'
        '404':
          $ref: '#/components/responses/SkillNotFoundError'

    delete:
      tags:
        - Skills
      summary: Delete a skill
      parameters:
        - $ref: '#/components/parameters/MongoIdPathParam'
      responses:
        '200':
          description: Skill deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
              examples:
                default:
                  value:
                    success: true
                    statusCode: 200
                    message: Skill deleted successfully.
                    timeStamp: '2026-04-08T06:11:03.000Z'
                    path: /api/v1/skills/660f0c1f4d8c8b3c2adfd111
        '400':
          $ref: '#/components/responses/InvalidSkillIdError'
        '404':
          $ref: '#/components/responses/SkillNotFoundError'

  /achievement:
    post:
      tags:
        - Achievements
      summary: Create an achievement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AchievementCreateRequest'
            examples:
              default:
                value:
                  user_id: 660f0c1f4d8c8b3c2adfd001
                  achievement_date: '2025-11-10'
                  title: Hackathon Finals
                  position: winner
                  description: Won the national product engineering challenge.
                  competition_name: Build Bharat Hackathon
                  images:
                    - https://res.cloudinary.com/demo/image/upload/v1/achievement-1.jpg
                  certificate_url: https://example.com/certificates/build-bharat.pdf
      responses:
        '201':
          description: Achievement created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AchievementMutationResponse'
              examples:
                default:
                  value:
                    success: true
                    statusCode: 201
                    message: Achievement created successfully.
                    data:
                      _id: 660f0c1f4d8c8b3c2adfd301
                      user_id: 660f0c1f4d8c8b3c2adfd001
                      achievement_date: '2025-11-10T00:00:00.000Z'
                      title: Hackathon Finals
                      position: winner
                      description: Won the national product engineering challenge.
                      competition_name: Build Bharat Hackathon
                      images:
                        - https://res.cloudinary.com/demo/image/upload/v1/achievement-1.jpg
                      certificate_url: https://example.com/certificates/build-bharat.pdf
                      createdAt: '2026-04-08T06:14:00.000Z'
                      updatedAt: '2026-04-08T06:14:00.000Z'
                    timeStamp: '2026-04-08T06:14:00.000Z'
                    path: /api/v1/achievement
        '400':
          $ref: '#/components/responses/ValidationError'

    get:
      tags:
        - Achievements
      summary: Get all achievements
      responses:
        '200':
          description: Achievements fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AchievementListResponse'
              examples:
                default:
                  value:
                    success: true
                    statusCode: 200
                    message: Request successful
                    data:
                      - _id: 660f0c1f4d8c8b3c2adfd301
                        user_id: 660f0c1f4d8c8b3c2adfd001
                        achievement_date: '2025-11-10T00:00:00.000Z'
                        title: Hackathon Finals
                        position: winner
                        competition_name: Build Bharat Hackathon
                        images:
                          - https://res.cloudinary.com/demo/image/upload/v1/achievement-1.jpg
                        certificate_url: https://example.com/certificates/build-bharat.pdf
                        createdAt: '2026-04-08T06:14:00.000Z'
                        updatedAt: '2026-04-08T06:14:00.000Z'
                    timeStamp: '2026-04-08T06:14:01.000Z'
                    path: /api/v1/achievement

  /achievement/search:
    get:
      tags:
        - Achievements
      summary: Search achievements by user, title, competition, or position
      parameters:
        - name: user_id
          in: query
          required: false
          description: Filter achievements for a specific user.
          schema:
            type: string
            example: 660f0c1f4d8c8b3c2adfd001
        - name: title
          in: query
          required: false
          description: Case-insensitive partial title match.
          schema:
            type: string
            example: hackathon
        - name: competition_name
          in: query
          required: false
          description: Case-insensitive partial competition name match.
          schema:
            type: string
            example: bharat
        - name: position
          in: query
          required: false
          description: Exact achievement position filter.
          schema:
            $ref: '#/components/schemas/AchievementPosition'
      responses:
        '200':
          description: Achievements fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AchievementListResponse'
              examples:
                byTitle:
                  value:
                    success: true
                    statusCode: 200
                    message: Request successful
                    data:
                      - _id: 660f0c1f4d8c8b3c2adfd301
                        user_id: 660f0c1f4d8c8b3c2adfd001
                        achievement_date: '2025-11-10T00:00:00.000Z'
                        title: Hackathon Finals
                        position: winner
                        competition_name: Build Bharat Hackathon
                    timeStamp: '2026-04-08T06:14:02.000Z'
                    path: /api/v1/achievement/search?title=hackathon
                byUser:
                  value:
                    success: true
                    statusCode: 200
                    message: Request successful
                    data:
                      - _id: 660f0c1f4d8c8b3c2adfd301
                        user_id: 660f0c1f4d8c8b3c2adfd001
                        achievement_date: '2025-11-10T00:00:00.000Z'
                        title: Hackathon Finals
                        position: winner
                        competition_name: Build Bharat Hackathon
                    timeStamp: '2026-04-08T06:14:02.000Z'
                    path: /api/v1/achievement/search?user_id=660f0c1f4d8c8b3c2adfd001
        '400':
          $ref: '#/components/responses/AchievementSearchQueryRequiredError'

  /achievement/{id}:
    get:
      tags:
        - Achievements
      summary: Get an achievement by id
      parameters:
        - $ref: '#/components/parameters/MongoIdPathParam'
      responses:
        '200':
          description: Achievement fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AchievementFetchResponse'
        '400':
          $ref: '#/components/responses/InvalidAchievementIdError'
        '404':
          $ref: '#/components/responses/AchievementNotFoundError'

    patch:
      tags:
        - Achievements
      summary: Update an achievement
      parameters:
        - $ref: '#/components/parameters/MongoIdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AchievementUpdateRequest'
            examples:
              default:
                value:
                  position: 1st
                  description: Secured first place after the final pitching round.
      responses:
        '200':
          description: Achievement updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AchievementMutationResponse'
        '400':
          $ref: '#/components/responses/InvalidAchievementIdError'
        '404':
          $ref: '#/components/responses/AchievementNotFoundError'

    delete:
      tags:
        - Achievements
      summary: Delete an achievement
      parameters:
        - $ref: '#/components/parameters/MongoIdPathParam'
      responses:
        '200':
          description: Achievement deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
              examples:
                default:
                  value:
                    success: true
                    statusCode: 200
                    message: Achievement deleted successfully.
                    timeStamp: '2026-04-08T06:14:03.000Z'
                    path: /api/v1/achievement/660f0c1f4d8c8b3c2adfd301
        '400':
          $ref: '#/components/responses/InvalidAchievementIdError'
        '404':
          $ref: '#/components/responses/AchievementNotFoundError'

  /testimonial:
    post:
      tags:
        - Testimonials
      summary: Create a testimonial
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestimonialCreateRequest'
      responses:
        '201':
          description: Testimonial created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestimonialMutationResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

    get:
      tags:
        - Testimonials
      summary: Get all testimonials
      responses:
        '200':
          description: Testimonials fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestimonialListResponse'

  /testimonial/search:
    get:
      tags:
        - Testimonials
      summary: Search testimonials by user, name, or rating
      parameters:
        - name: user_id
          in: query
          required: false
          schema:
            type: string
        - name: name
          in: query
          required: false
          schema:
            type: string
        - name: rating
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 5
      responses:
        '200':
          description: Testimonials fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestimonialListResponse'
        '400':
          $ref: '#/components/responses/TestimonialSearchQueryRequiredError'

  /testimonial/{id}:
    get:
      tags:
        - Testimonials
      summary: Get a testimonial by id
      parameters:
        - $ref: '#/components/parameters/MongoIdPathParam'
      responses:
        '200':
          description: Testimonial fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestimonialFetchResponse'
        '400':
          $ref: '#/components/responses/InvalidTestimonialIdError'
        '404':
          $ref: '#/components/responses/TestimonialNotFoundError'

    patch:
      tags:
        - Testimonials
      summary: Update a testimonial
      parameters:
        - $ref: '#/components/parameters/MongoIdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestimonialUpdateRequest'
      responses:
        '200':
          description: Testimonial updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestimonialMutationResponse'
        '400':
          $ref: '#/components/responses/InvalidTestimonialIdError'
        '404':
          $ref: '#/components/responses/TestimonialNotFoundError'

    delete:
      tags:
        - Testimonials
      summary: Delete a testimonial
      parameters:
        - $ref: '#/components/parameters/MongoIdPathParam'
      responses:
        '200':
          description: Testimonial deleted successfully
          content:
